spring:
  application:
    name: redis-config
  
  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 5
          max-wait: 1000ms
      cluster:
        enabled: false
        nodes:
          - redis-cluster:6380
        
  session:
    store-type: redis
    timeout: 30m
    redis:
      namespace: ecommerce:session
      
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: always

redis:
  cart:
    ttl: 2592000
    key-prefix: "cart:"
    
  rate-limit:
    requests-per-minute: 60
    window-seconds: 60
    
  cluster:
    enabled: false
    nodes: redis-cluster:6380
    redirects: 5
    
  persistence:
    aof:
      enabled: true
      fsync: everysec
    rdb:
      enabled: true
      save:
        - 900 1
        - 300 10
        - 60 10000
