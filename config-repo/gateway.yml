server.port: 8443
management.server.port: 8443
spring.application.name: gateway

server.ssl:
  key-store-type: PKCS12
  key-store: classpath:keystore/edge.p12
  key-alias: localhost

spring.cloud.gateway.routes:

# User Service
- id: user-service
  uri: http://user
  predicates:
  - Path=/api/users/**

# Product Catalog Service
- id: product-catalog-service
  uri: http://product-catalog
  predicates:
  - Path=/api/catalog/**

# Shopping Cart Service
- id: shopping-cart-service
  uri: http://shopping-cart
  predicates:
  - Path=/api/cart/**

# Order Service
- id: order-service
  uri: http://order
  predicates:
  - Path=/api/orders/**

# Inventory Service
- id: inventory-service
  uri: http://inventory
  predicates:
  - Path=/api/inventory/**

# Payment Service
- id: payment-service
  uri: http://payment
  predicates:
  - Path=/api/payments/**

# Shipping Service
- id: shipping-service
  uri: http://shipping
  predicates:
  - Path=/api/shipping/**

# Notification Service
- id: notification-service
  uri: http://notification
  predicates:
  - Path=/api/notifications/**

# Admin Service
- id: admin-service
  uri: http://admin
  predicates:
  - Path=/api/admin/**

# Analytics Service
- id: analytics-service
  uri: http://analytics
  predicates:
  - Path=/api/analytics/**

# Product Composite Service (existing)
- id: product-composite
  uri: http://product-composite
  predicates:
  - Path=/product-composite/**

# OAuth2 Server (existing)
- id: oauth2-server
  uri: http://${app.auth-server}
  predicates:
  - Path=/oauth2/**

- id: oauth2-login
  uri: http://${app.auth-server}
  predicates:
  - Path=/login/**

- id: oauth2-error
  uri: http://${app.auth-server}
  predicates:
  - Path=/error/**

- id: product-composite-swagger-ui
  uri: http://product-composite
  predicates:
  - Path=/openapi/**

- id: product-composite-swagger-ui-webjars
  uri: http://product-composite
  predicates:
  - Path=/webjars/**

spring.security.oauth2.resourceserver.jwt.issuer-uri: http://${app.auth-server}

management.endpoint.gateway.enabled: true

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: INFO
    org.springframework.cloud.gateway: TRACE
    org.springframework.web.server.adapter.HttpWebHandlerAdapter: TRACE

---
spring.config.activate.on-profile: prod

logging:
  level:
    root: WARN
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: WARN
    org.springframework.cloud.gateway: WARN
    org.springframework.web.server.adapter.HttpWebHandlerAdapter: WARN
