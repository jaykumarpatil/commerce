name: Build Verification Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  JAVA_VERSION: '25'
  NODE_VERSION: '21'
  COVERAGE_THRESHOLD: '80'

jobs:
  verify:
    name: Clean, Build, Test, Verify, Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Restore frontend build cache
        uses: actions/cache@v4
        with:
          path: |
            frontend/.angular/cache
            frontend/node_modules/.cache
          key: ${{ runner.os }}-angular-${{ hashFiles('frontend/package.json', 'frontend/angular.json') }}
          restore-keys: |
            ${{ runner.os }}-angular-

      - name: Run full build verification pipeline
        env:
          COVERAGE_THRESHOLD: ${{ env.COVERAGE_THRESHOLD }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./scripts/ci/build-verify.sh

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            **/build/reports/tests/**
            **/build/reports/jacoco/**

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
