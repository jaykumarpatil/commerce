spring:
  application:
    name: cart-service
  config:
    import: optional:file:./config-repo/cart-service.yml

  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/carts
      auto-index-creation: true

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

cart:
  cache:
    ttl: ${CACHE_TTL:3600}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    se.magnus.microservices.cart: DEBUG
    org.springframework.data.mongodb: INFO
    org.springframework.data.redis: INFO
