server:
  port: ${PORT:8084}

spring:
  application:
    name: inventory-service
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/inventorydb}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    stream:
      bindings:
        inventory-events-out-0:
          destination: inventory-events
          content-type: application/json

eureka:
  client:
    enabled: ${ENABLE_EUREKA:false}
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka:8761/eureka}
  instance:
    prefer-ip-address: true
    hostname: ${HOSTNAME:inventory-service}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.projects: DEBUG
    org.hibernate.SQL: DEBUG

app:
  notification-service:
    url: ${NOTIFICATION_SERVICE_URL:http://notification-service}

inventory:
  low-stock-alert:
    recipient: ${LOW_STOCK_ALERT_RECIPIENT:inventory-ops}
    throttle-minutes: ${LOW_STOCK_ALERT_THROTTLE_MINUTES:60}

resilience4j:
  retry:
    instances:
      notificationClient:
        max-attempts: ${NOTIFICATION_RETRY_MAX_ATTEMPTS:3}
        wait-duration: ${NOTIFICATION_RETRY_WAIT:2s}
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
  circuitbreaker:
    instances:
      notificationClient:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
