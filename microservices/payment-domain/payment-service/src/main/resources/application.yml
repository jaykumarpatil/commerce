spring:
  application:
    name: payment-service
  config:
    import: optional:file:./config-repo/payment-service.yml

  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/payments
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

server:
  port: ${PORT:8080}

payment:
  gateway:
    mock: ${USE_MOCK_GATEWAY:true}
    stripe:
      api-key: ${STRIPE_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    se.magnus.microservices.payment: DEBUG
    org.springframework.data.r2dbc: INFO
