server:
  port: ${PORT:8087}

spring:
  application:
    name: notification-service
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/notificationdb}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    stream:
      bindings:
        notification-events-out-0:
          destination: notification-events
          content-type: application/json

sendgrid:
  api-key: ${SENDGRID_API_KEY:}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}

eureka:
  client:
    enabled: ${ENABLE_EUREKA:false}
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka:8761/eureka}
  instance:
    prefer-ip-address: true
    hostname: ${HOSTNAME:notification-service}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    se.magnus: DEBUG
    org.hibernate.SQL: DEBUG
