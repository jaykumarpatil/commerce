spring:
  application:
    name: auth-service
  config:
    import: optional:file:./config-repo/auth-service.yml

  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/users
      auto-index-creation: true

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

security:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-signing}
    access-token-expiry-ms: ${JWT_EXPIRY:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.projects.microservices.auth: DEBUG
    org.springframework.data.mongodb: INFO
