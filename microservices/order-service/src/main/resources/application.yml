server:
  port: ${PORT:8083}

spring:
  application:
    name: order-service
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    stream:
      bindings:
        order-events-out-0:
          destination: order-events
          content-type: application/json

eureka:
  client:
    enabled: ${ENABLE_EUREKA:false}
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka:8761/eureka}
  instance:
    prefer-ip-address: true
    hostname: ${HOSTNAME:order-service}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.projects: DEBUG
    org.hibernate.SQL: DEBUG

app:
  services:
    shopping-cart:
      base-url: ${SHOPPING_CART_SERVICE_URL:http://shopping-cart-service}
    inventory:
      base-url: ${INVENTORY_SERVICE_URL:http://inventory-service}
    payment:
      base-url: ${PAYMENT_SERVICE_URL:http://payment-service}
    shipping:
      base-url: ${SHIPPING_SERVICE_URL:http://shipping-service}
    notification:
      base-url: ${NOTIFICATION_SERVICE_URL:http://notification-service}
    user:
      base-url: ${USER_SERVICE_URL:http://user-service}
